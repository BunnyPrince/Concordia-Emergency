<!DOCTYPE html>
<html>
  <head>
    <title>Campus Safety Homepage</title>
    <link rel="stylesheet" href="styles/homepage.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>

    <!-- Header -->
    <div class="header">
      <div class="crisis">!Crisis Mode!</div>
      <div class="logo">LOGO</div>

      <div class="auth-buttons">
        <div class="login" onclick="window.location.href='pages/logIn.html'">Log In</div>
        <div class="signup" onclick="window.location.href='pages/signUp.html'">Sign Up</div>
      </div>

      <div class="mobile-menu">☰</div>
    </div>

    <div class="dropdown-menu" id="dropdownMenu">
      <div class="login" onclick="window.location.href='pages/logIn.html'">Log In</div>
      <div class="signup" onclick="window.location.href='pages/signUp.html'">Sign Up</div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <div class="inner-container">
        <!-- Map -->
        <div class="map-section">
          <p>MAP</p>
        </div>

        <!-- Side Panel -->
        <div class="side-panel">

          <div class="legend">
            <p>Legend</p>
          </div>

          <div class="alert-history">
            <button onclick="window.location.href='pages/alertHistory.html'">Alert History</button>
          </div>

        </div>
      </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
          <div class="bottom-section-detail">
            <div class="info-text">
              <p>
                Reporting hazards helps students avoid unsafe or blocked areas on campus.
                Real-time updates improve safety and support calmer navigation,
                especially during protests or high-tension situations.
              </p>
            </div>

            <div class="report-button">
              <button>Report Hazard!</button>
            </div>
          </div>
        </div>

    </div>
    
    <script type="module" src="scripts/homepage.js"></script>
  </body>
</html>
