<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Report Hazard | Concordia Safety</title>
    <link rel="stylesheet" href="../styles/report.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="../images/concordia-logo.png">
  </head>
  <body>
     <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="logo" onclick="window.location.href='../homepage.html'"><img src="../images/concordia-full-logo.svg" style="height:35px;"></div>
        <div class="auth-buttons">
          <div class="login" onclick="window.location.href='logIn.html'"><img src="../images/user-regular.png" style="height:16px;vertical-align:middle;margin-right:6px;filter:invert(19%) sepia(72%) saturate(1200%) hue-rotate(320deg) brightness(80%)"> Log In</div>
          <div class="divider">|</div>
          <div class="signup" onclick="window.location.href='signUp.html'">Sign Up</div>
        </div>
        <div class="mobile-menu">&#9776;</div>
      </div>
      <div class="header-bottom">
        <div class="crisis">⚠️ Crisis Mode</div>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <div class="inner-container">
        <div class="outer-progress-bar">
          <div class="progress-bar">
            <progress id="formProgress" value="1" max="3"></progress> 
          </div>
        </div>

        <div class="title">
          <p>Hazard Type</p>
        </div>

        <div class="input-container">
          
          <div class="type-container">
            <button class="type-button protest-js"
              onclick="window.location.href='hazardsPages/protest.html'">
              Protest
            </button>
            <button class="type-button construction-js"
              onclick="window.location.href='hazardsPages/construction.html'">
              Contruction
            </button>
            <button class="type-button weather-js"
              onclick="window.location.href='hazardsPages/weather.html'">
              Weather Hazard
            </button>
            <button class="type-button elevator-js"
              onclick="window.location.href='hazardsPages/elevator.html'">
              Elevator Malfunction
            </button>
            <button class="type-button other-button other-js"
              onclick="window.location.href='hazardsPages/other.html'">
              Others
            </button>
          </div>
        
      </div>
    </div>
    
    <script type="module" src="../scripts/report.js"></script>
    <script></script>
  </body>
</html>
