<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up page</title>
    <link rel="stylesheet" href="../../styles/hazardsPages/confirmation.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
     <!-- Header -->
    <div class="header">
      <div class="crisis">!Crisis Mode!</div>
      <div class="logo" onclick="window.location.href='../../homepage.html'">LOGO</div>
      <div class="logIn" onclick="window.location.href='../../homepage.html'">Home</div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <div class="inner-container">
        <div class="outer-progress-bar">
          <div class="progress-bar">
            <progress id="formProgress" value="3" max="3"></progress> 
          </div>
        </div>
        

        <div class="title">
          <p>Confirmation</p>
        </div>

        <div class="input-container">
          <div class="input-outer-container">
            <div class="form-details-js" id="detail">
            </div>
            <div class="submit-button">
              <button type="submit" id="submitBtn">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="successPopup" class="popup-overlay">
      <div class="popup-box">
        <p>Submission successful!</p>
        <button id="popupOkBtn">OK</button>
      </div>
    </div>

    
    <script type="module" src="../../scripts/hazardsPages/confirmation.js"></script>
    <script></script>
  </body>
</html>
