<!DOCTYPE html>
<html>
  <head>
    <title>Campus Safety Homepage</title>
    <link rel="stylesheet" href="../styles/alertHistory.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>

    <!-- Header -->
    <div class="header">
      <div class="crisis">!Crisis Mode!</div>
      <div class="logo" onclick="window.location.href='../homepage.html'">LOGO</div>
      <div class="home" onclick="window.location.href='../homepage.html'">Home</div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <div class="inner-container">
        <div class="title">
          <p>Recent Alerts History</p>
        </div>
        
        <div class="inner-card status">
          <div class="detail-card verification">
            <p>Verification: </p>
            <div class="verification-details">
              <p>Reported by 3 students</p>
            </div>
          </div>

          <div class="detail-card update">
            <p>Last Update: </p>
          </div>

          <div class="detail-card impact">
            <p>Impact Lavel: </p>
          </div>

          <div class="detail-card status">
            <p>Status: </p>
          </div>
        </div>

        <div class="details">
          <div class="location"></div>
          <div class="situations"></div>
          <div class="accessibility"></div>
          <div class="community"></div>
        </div>

        <div class="action">
        </div>

        <div class="review">
        </div>

      </div>
    </div>
    <script type="module" src="../scripts/alertHistory.js"></script>
  </body>
</html>
